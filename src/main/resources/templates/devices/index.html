<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quản lý Thiết bị</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1 class="mb-4">Danh sách Thiết bị</h1>

    <!-- Filter form -->
    <form class="row g-3 mb-4" method="get" action="/devices">
        <div class="col-md-5">
            <input type="text" class="form-control" name="keyword" th:value="${keyword}" placeholder="Tìm kiếm theo Tên thiết bị...">
        </div>
        <div class="col-md-4">
            <select class="form-select" name="brandId">
                <option value="">-- Tất cả Thương hiệu --</option>
                <option th:each="b : ${brands}" th:value="${b.id}" th:text="${b.name}" th:selected="${b.id == brandId}"></option>
            </select>
        </div>
        <div class="col-md-3">
            <button type="submit" class="btn btn-info text-white">Lọc & Tìm kiếm</button>
            <a href="/devices" class="btn btn-outline-secondary">Xóa lọc</a>
        </div>
    </form>

    <a href="/devices/create" class="btn btn-primary mb-3">Thêm Thiết bị mới</a>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
        <tr>
            <th>Tên thiết bị</th>
            <th>Mã model</th>
            <th>Thương hiệu</th>
            <th>Giá</th>
            <th>Ngày SX</th>
            <th>Ảnh</th>
            <th>Sẵn có</th>
            <th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="d : ${devicePage.content}">
            <td th:text="${d.deviceName}"></td>
            <td th:text="${d.modelCode}"></td>
            <td th:text="${d.brand != null ? d.brand.name : ''}"></td>
            <td th:text="${#numbers.formatDecimal(d.price, 0, 'COMMA', 0, 'POINT')}"></td>
            <td th:text="${d.manufactureDate}"></td>
            <td>
                <img th:if="${d.productImage != null}" th:src="@{'/uploads/' + ${d.productImage}}" width="50" class="img-thumbnail"/>
            </td>
            <td th:text="${d.isAvailable ? 'Có' : 'Không'}"></td>
            <td>
                <a th:href="@{/devices/edit/{id}(id=${d.id})}" class="btn btn-warning btn-sm">Sửa</a>
                <form th:action="@{/devices/delete/{id}(id=${d.id})}" method="post" style="display:inline;" onsubmit="return confirm('Bạn có chắc chắn muốn xóa không?');">
                    <button type="submit" class="btn btn-danger btn-sm">Xóa</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <nav th:if="${devicePage.totalPages > 0}" aria-label="Page navigation">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${!devicePage.hasPrevious()} ? 'disabled'">
                <a class="page-link" th:href="@{/devices(page=${currentPage - 1}, keyword=${keyword}, brandId=${brandId})}">Trang trước</a>
            </li>

            <li class="page-item" th:each="i : ${#numbers.sequence(0, devicePage.totalPages - 1)}"
                th:classappend="${currentPage == i} ? 'active'">
                <a class="page-link" th:href="@{/devices(page=${i}, keyword=${keyword}, brandId=${brandId})}" th:text="${i + 1}"></a>
            </li>

            <li class="page-item" th:classappend="${!devicePage.hasNext()} ? 'disabled'">
                <a class="page-link" th:href="@{/devices(page=${currentPage + 1}, keyword=${keyword}, brandId=${brandId})}">Trang sau</a>
            </li>
        </ul>
    </nav>

    <a href="/brands" class="btn btn-secondary mt-3">Quản lý Thương Hiệu</a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
