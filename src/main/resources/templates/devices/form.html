<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Form Thiết Bị</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .error { color: red; font-size: 0.9em; }
    </style>
</head>
<body>
<div class="container mt-5">
    <h1 class="mb-4" th:text="${deviceDto.id != null ? 'Sửa Thiết Bị' : 'Thêm Thiết Bị'}">Form</h1>

    <div class="card">
        <div class="card-body">
            <form th:action="${deviceDto.id != null ? '/devices/edit/' + deviceDto.id : '/devices/create'}" th:object="${deviceDto}" method="post" enctype="multipart/form-data">

                <input type="hidden" th:field="*{productImage}"/>
                <input type="hidden" th:field="*{id}"/>

                <div class="mb-3">
                    <label class="form-label">Thương hiệu:</label>
                    <select class="form-select" th:field="*{brandId}" th:classappend="${#fields.hasErrors('brandId')} ? 'is-invalid' : ''">
                        <option value="">-- Chọn Thương Hiệu --</option>
                        <option th:each="b : ${brands}" th:value="${b.id}" th:text="${b.name}"></option>
                    </select>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('brandId')}" th:errors="*{brandId}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Tên thiết bị:</label>
                    <input type="text" class="form-control" th:field="*{deviceName}" th:classappend="${#fields.hasErrors('deviceName')} ? 'is-invalid' : ''"/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('deviceName')}" th:errors="*{deviceName}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Mã model:</label>
                    <input type="text" class="form-control" th:field="*{modelCode}" th:classappend="${#fields.hasErrors('modelCode')} ? 'is-invalid' : ''"/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('modelCode')}" th:errors="*{modelCode}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Giá:</label>
                    <input type="number" class="form-control" th:field="*{price}" step="any" th:classappend="${#fields.hasErrors('price')} ? 'is-invalid' : ''"/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Ngày sản xuất:</label>
                    <input type="date" class="form-control" th:field="*{manufactureDate}" th:classappend="${#fields.hasErrors('manufactureDate')} ? 'is-invalid' : ''"/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('manufactureDate')}" th:errors="*{manufactureDate}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Ảnh sản phẩm:</label>
                    <input type="file" class="form-control" th:field="*{imageFile}" accept="image/*" th:classappend="${#fields.hasErrors('imageFile')} ? 'is-invalid' : ''"/>
                    <div class="mt-2" th:if="${deviceDto.productImage != null}">
                        <p class="mb-1 text-muted">Ảnh hiện tại:</p>
                        <img th:src="@{'/uploads/' + ${deviceDto.productImage}}" width="100" class="img-thumbnail"/>
                    </div>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('imageFile')}" th:errors="*{imageFile}"></div>
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" th:field="*{isAvailable}"/>
                    <label class="form-check-label">Có sẵn</label>
                </div>

                <button type="submit" class="btn btn-success">Lưu</button>
                <a href="/devices" class="btn btn-secondary">Quay lại</a>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
