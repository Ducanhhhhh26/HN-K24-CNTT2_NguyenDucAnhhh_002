<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Form Thương Hiệu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .error { color: red; font-size: 0.9em; }
    </style>
</head>
<body>
<div class="container mt-5">
    <h1 class="mb-4" th:text="${brand.id != null ? 'Sửa Thương Hiệu' : 'Thêm Thương Hiệu'}">Form</h1>

    <div class="card">
        <div class="card-body">
            <form th:action="${brand.id != null ? '/brands/edit/' + brand.id : '/brands/create'}" th:object="${brand}" method="post">

                <div class="mb-3">
                    <label class="form-label">Tên Thương Hiệu:</label>
                    <input type="text" class="form-control" th:field="*{name}" th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''"/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Mô tả:</label>
                    <textarea class="form-control" th:field="*{description}" rows="4"></textarea>
                    <div class="error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                </div>

                <button type="submit" class="btn btn-success">Lưu</button>
                <a href="/brands" class="btn btn-secondary">Quay lại</a>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
